<!DOCTYPE html>
<html>
<head>
  <title>Audit Logs</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }
    table {
      border-collapse: collapse;
      width: 100%;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: left;
    }
    th {
      background: #f4f4f4;
    }
  </style>
</head>
<body>

<h2>Audit Logs (Admin)</h2>

<table>
  <thead>
    <tr>
      <th>User</th>
      <th>Action</th>
      <th>IP</th>
      <th>Time</th>
    </tr>
  </thead>
  <tbody id="table-body"></tbody>
</table>

<script>
  const token = "PUT_YOUR_ACCESS_TOKEN_HERE";

  fetch("http://localhost:3000/api/admin/audit-logs", {
    headers: {
      Authorization: "Bearer " + token,
    },
  })
    .then(res => res.json())
    .then(data => {
      const logs = data.data.logs;
      const tbody = document.getElementById("table-body");

      logs.forEach(log => {
        const row = `
          <tr>
            <td>${log.user?.email || "-"}</td>
            <td>${log.action}</td>
            <td>${log.ip_address || "-"}</td>
            <td>${new Date(log.created_at).toLocaleString()}</td>
          </tr>
        `;
        tbody.innerHTML += row;
      });
    })
    .catch(err => console.error(err));
</script>

</body>
</html>
